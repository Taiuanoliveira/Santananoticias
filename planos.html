<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planos – Veritas Notícias</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .planos-hero { text-align:center; padding: 48px 20px 32px; }
    .planos-hero h1 { font-family:'Playfair Display',serif; font-size:36px; margin-bottom:10px; }
    .planos-hero p { font-size:15px; color:#666; max-width:520px; margin:0 auto; }
    .planos-tabs { display:flex; justify-content:center; gap:12px; margin:24px auto; flex-wrap:wrap; }
    .tab-btn { padding:10px 28px; border:2px solid #ddd; background:#fff; font-size:14px; font-weight:700; cursor:pointer; font-family:Inter,sans-serif; transition:all .2s; }
    .tab-btn.ativo { border-color:#00cc66; background:#00cc66; color:#0a0a0a; }
    .tab-desc { text-align:center; font-size:13px; color:#888; margin-bottom:28px; padding:0 20px; }
    .planos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:24px; max-width:900px; margin:0 auto; padding:0 20px 60px; }
    .plano-card { border:1.5px solid #eee; padding:32px 24px; text-align:center; position:relative; }
    .plano-card.destaque { border-color:#00cc66; }
    .plano-badge { position:absolute; top:-12px; left:50%; transform:translateX(-50%); background:#00cc66; color:#0a0a0a; font-size:11px; font-weight:700; padding:4px 14px; text-transform:uppercase; letter-spacing:1px; white-space:nowrap; }
    .plano-nome { font-family:'Playfair Display',serif; font-size:22px; font-weight:900; margin-bottom:8px; }
    .plano-preco { font-size:36px; font-weight:900; margin:16px 0 4px; }
    .plano-preco span { font-size:14px; font-weight:400; color:#888; }
    .plano-desc { font-size:13px; color:#666; margin-bottom:24px; line-height:1.6; }
    .plano-beneficios { list-style:none; padding:0; margin:0 0 24px; text-align:left; }
    .plano-beneficios li { font-size:13px; padding:6px 0; border-bottom:1px solid #f4f4f4; }
    .plano-beneficios li::before { content:'✓ '; color:#00cc66; font-weight:700; }
    .btn-assinar { background:#0a0a0a; color:#fff; border:none; padding:14px 32px; font-size:14px; font-weight:700; cursor:pointer; width:100%; font-family:Inter,sans-serif; transition:background .2s; }
    .btn-assinar:hover { background:#00cc66; color:#0a0a0a; }
    .aviso-pagamento { max-width:900px; margin:0 auto 24px; padding:0 20px; }
    .aviso-box { padding:14px 18px; font-size:13px; font-weight:600; text-align:center; }
    .aviso-box.aprovado { background:#d4edda; color:#1a5c2a; }
    .aviso-box.pendente { background:#fff3cd; color:#856404; }
    .aviso-box.falhou { background:#f8d7da; color:#721c24; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-main" style="justify-content:center;">
      <div class="logo-area">
        <a href="index.html"><h1 class="logo">Veritas Notícias</h1></a>
      </div>
    </div>
  </header>

  <main>
    <div class="planos-hero">
      <h1>Veritas+</h1>
      <p>Acesse todo o conteúdo exclusivo, sem limites. Escolha como prefere pagar.</p>
    </div>

    <!-- AVISO RETORNO PAGAMENTO -->
    <div class="aviso-pagamento" id="avisoRetorno" style="display:none;">
      <div class="aviso-box" id="avisoBox"></div>
    </div>

    <!-- TABS -->
    <div class="planos-tabs">
      <button class="tab-btn ativo" onclick="trocarTab('checkout')">⚡ Pix / Boleto</button>
      <button class="tab-btn" onclick="trocarTab('assinatura')">💳 Cartão recorrente</button>
    </div>

    <div class="tab-desc" id="tabDesc">
      Pague via <strong>Pix ou Boleto</strong> — você paga manualmente e o acesso é liberado automaticamente na hora da confirmação.
    </div>

    <!-- PLANOS -->
    <div class="planos-grid" id="planosGrid"></div>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom">
      <span>© 2026 Veritas Notícias – Todos os direitos reservados</span>
    </div>
  </footer>

  <script type="module">
    import { auth } from "./js/firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    let usuarioAtual = null;
    let tabAtual = 'checkout';

    onAuthStateChanged(auth, (user) => {
      usuarioAtual = user;
    });

    // Aviso de retorno do pagamento
    const params = new URLSearchParams(window.location.search);
    const statusPag = params.get('status');
    if (statusPag) {
      const avisos = {
        aprovado: { texto: '✅ Pagamento aprovado! Sua assinatura já está ativa.', classe: 'aprovado' },
        pendente: { texto: '⏳ Pagamento em análise. Você será avisado assim que for confirmado.', classe: 'pendente' },
        falhou:   { texto: '❌ O pagamento não foi concluído. Tente novamente.', classe: 'falhou' }
      };
      const aviso = avisos[statusPag];
      if (aviso) {
        document.getElementById('avisoRetorno').style.display = 'block';
        const box = document.getElementById('avisoBox');
        box.textContent = aviso.texto;
        box.className = 'aviso-box ' + aviso.classe;
      }
    }

    const MENSAL_BASE = 19.9;
    const PLANOS_CHECKOUT = [
      {
        id: 'mensal',
        nome: 'Mensal',
        preco: 'R$ 19.90'.replace('.', ','),
        periodo: 'por mês',
        desc: 'Pague via Pix ou Boleto todo mês. O acesso é liberado automaticamente após a confirmação do pagamento.',
        beneficios: [
          'Acesso completo ao editorial',
          'Leia todas as edições exclusivas',
          'Conteúdo antecipado e exclusivo',
          'Sem anúncios',
        ],
        destaque: false
      },
      {
        id: 'trimestral',
        nome: 'Trimestral',
        preco: 'R$ 50.15'.replace('.', ','),
        periodo: 'a cada 3 meses',
        economia: '16% de desconto',
        desc: 'Pague a cada 3 meses e economize. Acesso liberado automaticamente após confirmação.',
        beneficios: [
          'Acesso completo ao editorial',
          'Leia todas as edições exclusivas',
          'Conteúdo antecipado e exclusivo',
          'Sem anúncios',
          '16% mais barato que o mensal',
        ],
        destaque: true,
        badge: 'Mais popular'
      },
      {
        id: 'anual',
        nome: 'Anual',
        preco: 'R$ 160.00'.replace('.', ','),
        periodo: 'por ano',
        economia: '33% de desconto',
        desc: 'Pague uma vez e fique tranquilo por 12 meses. Melhor custo-benefício.',
        beneficios: [
          'Acesso completo ao editorial',
          'Leia todas as edições exclusivas',
          'Conteúdo antecipado e exclusivo',
          'Sem anúncios',
          '33% mais barato que o mensal',
        ],
        destaque: false
      }
    ];

    const PLANOS_ASSINATURA = [
      {
        id: 'mensal_cartao',
        nome: 'Mensal',
        preco: 'R$ 19.90'.replace('.', ','),
        periodo: '/mês no cartão',
        desc: 'Cobrança automática todo mês no cartão. Assine uma vez e esqueça — renova sozinho.',
        beneficios: [
          'Acesso completo ao editorial',
          'Leia todas as edições exclusivas',
          'Conteúdo antecipado e exclusivo',
          'Sem anúncios',
          'Cancele quando quiser',
        ],
        destaque: false
      },
      {
        id: 'trimestral_cartao',
        nome: 'Trimestral',
        preco: 'R$ 50.15'.replace('.', ','),
        periodo: '/trimestre no cartão',
        economia: '16% de desconto',
        desc: 'Cobrança automática a cada 3 meses. Mais econômico e sem preocupação.',
        beneficios: [
          'Acesso completo ao editorial',
          'Leia todas as edições exclusivas',
          'Conteúdo antecipado e exclusivo',
          'Sem anúncios',
          '16% mais barato que o mensal',
          'Cancele quando quiser',
        ],
        destaque: true,
        badge: 'Mais popular'
      },
      {
        id: 'anual_cartao',
        nome: 'Anual',
        preco: 'R$ 160.00'.replace('.', ','),
        periodo: '/ano no cartão',
        economia: '33% de desconto',
        desc: 'Cobrado automaticamente uma vez por ano. Melhor preço garantido.',
        beneficios: [
          'Acesso completo ao editorial',
          'Leia todas as edições exclusivas',
          'Conteúdo antecipado e exclusivo',
          'Sem anúncios',
          '33% mais barato que o mensal',
          'Cancele quando quiser',
        ],
        destaque: false
      }
    ];

    function renderPlanos(planos) {
      const grid = document.getElementById('planosGrid');
      grid.innerHTML = planos.map(p => `
        <div class="plano-card ${p.destaque ? 'destaque' : ''}">
          ${p.badge ? `<div class="plano-badge">${p.badge}</div>` : ''}
          <div class="plano-nome">${p.nome}</div>
          <div class="plano-preco">${p.preco} <span>${p.periodo}</span></div>
          ${p.economia ? `<div style="font-size:12px;font-weight:700;color:#00cc66;margin-bottom:8px;">${p.economia}</div>` : ''}
          <p class="plano-desc">${p.desc}</p>
          <ul class="plano-beneficios">
            ${p.beneficios.map(b => `<li>${b}</li>`).join('')}
          </ul>
          <button class="btn-assinar" data-plano="${p.id}" data-tipo="${tabAtual}">Assinar agora</button>
        </div>
      `).join('');

      grid.querySelectorAll('.btn-assinar').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!usuarioAtual) {
            alert('Você precisa criar uma conta ou entrar para assinar.');
            window.location.href = 'login.html';
            return;
          }
          const textoOriginal = btn.textContent;
          btn.textContent = 'Gerando pagamento...';
          btn.style.pointerEvents = 'none';
          try {
            const endpoint = btn.dataset.tipo === 'assinatura' ? '/api/checkout-assinatura' : '/api/checkout';
            const resposta = await fetch(endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                planoId: btn.dataset.plano,
                usuarioId: usuarioAtual.uid,
                usuarioEmail: usuarioAtual.email
              })
            });
            const dados = await resposta.json();
            if (!resposta.ok || !dados.checkoutUrl) throw new Error(dados.erro || 'Erro ao gerar pagamento.');
            window.location.href = dados.checkoutUrl;
          } catch (err) {
            alert('Erro: ' + err.message);
            btn.textContent = textoOriginal;
            btn.style.pointerEvents = 'auto';
          }
        });
      });
    }

    window.trocarTab = function(tipo) {
      tabAtual = tipo;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('ativo'));
      event.target.classList.add('ativo');
      const desc = document.getElementById('tabDesc');
      if (tipo === 'checkout') {
        desc.innerHTML = 'Pague via <strong>Pix ou Boleto</strong> — você paga manualmente e o acesso é liberado automaticamente na hora da confirmação.';
        renderPlanos(PLANOS_CHECKOUT);
      } else {
        desc.innerHTML = 'Pague via <strong>Cartão de crédito</strong> — cobrança automática recorrente. Assine uma vez e esqueça, renova sozinho.';
        renderPlanos(PLANOS_ASSINATURA);
      }
    };

    // Inicia com Pix/Boleto
    renderPlanos(PLANOS_CHECKOUT);
  </script>
</body>
</html>
