<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(function(OneSignal) {
      OneSignal.init({ appId: "d391c7f0-84aa-434a-b6bd-efc73611e68c" });
    });
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Notícia – Painel Veritas Notícias</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    .ql-editor { min-height: 260px; line-height: 1.7; }
    .ql-snow .ql-picker { color: #0a0a0a; }
  </style>
</head>
<body class="admin-body">

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-logo">Veritas Notícias</div>
      <p class="admin-cargo-label">Cargo: <strong id="cargoAtual">—</strong></p>
      <nav class="admin-nav" id="menuAdmin"></nav>
      <button id="btnSair" class="admin-btn-sair">Sair</button>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <h1 id="tituloPagina">Nova Notícia</h1>
        <a href="../index.html" class="admin-link-site">Ver site →</a>
      </header>

      <section class="admin-bloco">
        <div id="mensagemErro" class="auth-msg erro" style="display:none;"></div>
        <div id="mensagemSucesso" class="auth-msg sucesso" style="display:none;"></div>

        <form id="formNoticia" class="form-noticia">
          <label for="titulo">Título</label>
          <input type="text" id="titulo" required placeholder="Título da notícia">

          <label>Categorias <span style="font-weight:400;color:#888;">(marque uma ou mais — a primeira marcada vira a categoria principal)</span></label>
          <div id="containerCategorias" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
            <p style="font-size:13px;color:#777;">Carregando categorias...</p>
          </div>
          <input type="hidden" id="categoria" required>

          <label for="resumo">Resumo (aparece nos cards)</label>
          <textarea id="resumo" rows="2" placeholder="Resumo curto da notícia"></textarea>

          <label>Conteúdo completo</label>
          <div id="editorQuill"></div>
          <input type="hidden" id="conteudo">

          <label for="edicao">Edição</label>
          <select id="edicao">
            <option value="">Nenhuma (notícia avulsa)</option>
          </select>
          <p style="font-size:12px;color:#888;margin-top:-4px;">Só aparecem edições ainda não publicadas. A ordem das matérias dentro da edição é definida pelo administrador na tela de Edições.</p>

          <div id="containerGratuito" style="display:none;">
            <label style="display:flex;align-items:center;gap:8px;margin-top:14px;">
              <input type="checkbox" id="gratuito" style="width:auto;">
              Artigo gratuito (mesmo fazendo parte da edição paga)
            </label>
          </div>

          <label for="imagem">Imagem de destaque</label>
          <input type="file" id="imagem" accept="image/*">
          <img id="previewImagem" class="preview-imagem" style="display:none;">

          <div class="form-acoes" id="formAcoes">
            <!-- Botões inseridos via JS conforme o cargo -->
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
  <script type="module">
    import { protegerPagina, sair, CARGOS } from "../js/auth.js";
    import { criarNoticia, atualizarNoticia, obterNoticia, enviarImagem, STATUS } from "../js/noticias.js";
    import { db } from "../js/firebase-config.js";
    import { enviarImagemCloudinary } from "../js/cloudinary.js";

    import { collection, getDocs, orderBy, query, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    async function carregarCategoriasCheckboxes(categoriasAtuais) {
      const container = document.getElementById('containerCategorias');
      try {
        const snap = await getDocs(query(collection(db, 'categorias'), orderBy('ordem')));
        if (snap.empty) {
          container.innerHTML = '<p style="font-size:13px;color:#777;">Nenhuma categoria cadastrada.</p>';
          return;
        }
        container.innerHTML = '';
        snap.forEach(d => {
          const cat = d.data();
          const slug = cat.slug || cat.nome.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,'-');
          const marcado = Array.isArray(categoriasAtuais) ? categoriasAtuais.includes(slug) : categoriasAtuais === slug;
          const label = document.createElement('label');
          label.style.cssText = 'display:flex;align-items:center;gap:6px;background:#fff;padding:8px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;border:1.5px solid #eee;transition:all .2s;';
          label.innerHTML = `<input type="checkbox" value="${slug}" style="width:auto;" ${marcado ? 'checked' : ''}> ${cat.emoji || ''} ${cat.nome}`;
          label.querySelector('input').addEventListener('change', () => {
            label.style.borderColor = label.querySelector('input').checked ? '#00cc66' : '#eee';
            label.style.background = label.querySelector('input').checked ? '#f0fff8' : '#fff';
            atualizarCategoriaHidden();
          });
          if (marcado) {
            label.style.borderColor = '#00cc66';
            label.style.background = '#f0fff8';
          }
          container.appendChild(label);
        });
        atualizarCategoriaHidden();
      } catch (e) { container.innerHTML = '<p style="color:#b3261e;font-size:13px;">Erro ao carregar categorias.</p>'; }
    }

    function atualizarCategoriaHidden() {
      const selecionadas = Array.from(document.querySelectorAll('#containerCategorias input:checked')).map(i => i.value);
      document.getElementById('categoria').value = selecionadas[0] || '';
    }

    async function carregarEdicoesNoSelect() {
      const select = document.getElementById('edicao');
      try {
        const q = query(collection(db, 'edicoes'), orderBy('criadoEm', 'desc'));
        const snap = await getDocs(q);
        snap.forEach(d => {
          const ed = d.data();
          if (ed.status === 'publicada') return;
          const opt = document.createElement('option');
          opt.value = ed.nome;
          opt.textContent = ed.nome;
          select.appendChild(opt);
        });
      } catch (e) { console.error('Erro ao carregar edicoes:', e); }
    }
    carregarEdicoesNoSelect();

    function gerarSlug(nome) {
      return nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, '-');
    }

    let usuarioAtual = null;
    let cargoAtual = null;
    let noticiaIdEdicao = null;
    let imagemAtualUrl = null;

    const params = new URLSearchParams(window.location.search);
    const idParaEditar = params.get('id');

    protegerPagina(
      [CARGOS.ADMIN, CARGOS.EDITOR, CARGOS.COLUNISTA],
      async (user, cargo) => {
        usuarioAtual = user;
        cargoAtual = cargo;
        document.getElementById('nomeUsuario')?.textContent;
        document.getElementById('cargoAtual').textContent = formatarCargo(cargo);
        montarMenu(cargo);
        montarBotoesAcao(cargo);

        if (idParaEditar) {
          noticiaIdEdicao = idParaEditar;
          document.getElementById('tituloPagina').textContent = 'Editar Notícia';
          await carregarNoticia(idParaEditar);
        } else {
          carregarCategoriasCheckboxes([]);
        }
      }
    );

    function formatarCargo(cargo) {
      const nomes = { administrador: 'Administrador', editor: 'Editor', colunista: 'Colunista', revisor: 'Revisor' };
      return nomes[cargo] || cargo;
    }

    function montarMenu(cargo) {
      const menu = document.getElementById('menuAdmin');
      const itens = [
        { href: 'dashboard.html', label: '📊 Dashboard', cargos: ['administrador','editor','colunista','revisor'] },
        { href: 'publicar.html', label: '✍️ Nova Notícia', cargos: ['administrador','editor','colunista'] },
        { href: 'gerenciar-noticias.html', label: '📰 Gerenciar Notícias', cargos: ['administrador','editor','colunista','revisor'] },
        { href: 'categorias-admin.html', label: '🏷️ Categorias', cargos: ['administrador','editor'] },
        { href: 'edicoes-admin.html', label: '📚 Edições', cargos: ['administrador','editor'] },
        { href: 'estatisticas-admin.html', label: '📈 Estatísticas', cargos: ['administrador','editor'] },
        { href: 'equipe-admin.html', label: '👥 Equipe', cargos: ['administrador'] },
        { href: 'publicidade-admin.html', label: '📢 Publicidade', cargos: ['administrador'] },
        { href: 'planos-admin.html', label: '💳 Planos', cargos: ['administrador'] },
        { href: 'usuarios.html', label: '👤 Usuários', cargos: ['administrador'] },
        { href: 'configuracoes.html', label: '⚙️ Configurações', cargos: ['administrador'] },
      ];
      menu.innerHTML = itens.filter(i => i.cargos.includes(cargo)).map(i => `<a href="${i.href}">${i.label}</a>`).join('');
    }

    function montarBotoesAcao(cargo) {
      const acoes = document.getElementById('formAcoes');
      if (cargo === CARGOS.COLUNISTA) {
        acoes.innerHTML = `
          <button type="button" class="btn-auth btn-secundario" data-acao="rascunho">Salvar rascunho</button>
          <button type="button" class="btn-auth" data-acao="enviar_revisao">Enviar para revisão</button>
        `;
      } else {
        acoes.innerHTML = `
          <button type="button" class="btn-auth btn-secundario" data-acao="rascunho">Salvar rascunho</button>
          <button type="button" class="btn-auth" data-acao="publicar">Publicar</button>
        `;
      }

      acoes.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => salvarNoticia(btn.dataset.acao));
      });

      // Troca botao e comportamento quando seleciona edicao
      document.getElementById('edicao').addEventListener('change', function() {
        const temEdicao = this.value !== '';
        const acoes = document.getElementById('formAcoes');
        if (cargo === CARGOS.COLUNISTA) {
          acoes.innerHTML = temEdicao
            ? `<button type="button" class="btn-auth btn-secundario" data-acao="rascunho">Salvar rascunho</button>
               <button type="button" class="btn-auth" data-acao="enviar_revisao">Enviar para revisão</button>`
            : `<button type="button" class="btn-auth btn-secundario" data-acao="rascunho">Salvar rascunho</button>
               <button type="button" class="btn-auth" data-acao="enviar_revisao">Enviar para revisão</button>`;
        } else {
          acoes.innerHTML = temEdicao
            ? `<button type="button" class="btn-auth btn-secundario" data-acao="rascunho">Salvar rascunho</button>
               <button type="button" class="btn-auth" data-acao="indexar" style="background:#5c4a00;">Indexar na Edição</button>`
            : `<button type="button" class="btn-auth btn-secundario" data-acao="rascunho">Salvar rascunho</button>
               <button type="button" class="btn-auth" data-acao="publicar">Publicar</button>`;
        }
        acoes.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', () => salvarNoticia(btn.dataset.acao));
        });
      });
    }

    async function carregarNoticia(id) {
      const noticia = await obterNoticia(id);
      if (!noticia) return;
      document.getElementById('titulo').value = noticia.titulo || '';
      document.getElementById('categoria').value = noticia.categoria || '';
      document.getElementById('resumo').value = noticia.resumo || '';
      // Carrega o conteudo no Quill (aguarda o editor estar pronto)
      setTimeout(() => {
        if (quillEditor) {
          quillEditor.root.innerHTML = noticia.conteudo || '';
        }
      }, 300);

      const catsAtuais = noticia.categorias || (noticia.categoria ? [noticia.categoria] : []);
      carregarCategoriasCheckboxes(catsAtuais);
      if (noticia.imagemUrl) {
        imagemAtualUrl = noticia.imagemUrl;
        const preview = document.getElementById('previewImagem');
        preview.src = noticia.imagemUrl;
        preview.style.display = 'block';
      }
    }

    document.getElementById('imagem').addEventListener('change', (e) => {
      const arquivo = e.target.files[0];
      if (!arquivo) return;
      const preview = document.getElementById('previewImagem');
      preview.src = URL.createObjectURL(arquivo);
      preview.style.display = 'block';
    });

    function mostrarErro(texto) {
      const el = document.getElementById('mensagemErro');
      document.getElementById('mensagemSucesso').style.display = 'none';
      el.textContent = texto;
      el.style.display = 'block';
    }

    function mostrarSucesso(texto) {
      const el = document.getElementById('mensagemSucesso');
      document.getElementById('mensagemErro').style.display = 'none';
      el.textContent = texto;
      el.style.display = 'block';
    }

    async function salvarNoticia(acao) {
      const titulo = document.getElementById('titulo').value.trim();
      const resumo = document.getElementById('resumo').value.trim();
      // Pega o HTML do editor Quill
      const conteudoHtml = quillEditor.root.innerHTML;
      const conteudoTexto = quillEditor.getText().trim();
      document.getElementById('conteudo').value = conteudoHtml;
      const conteudo = conteudoHtml;

      // Pega todas as categorias marcadas — a primeira marcada é a principal
      const categoriasSelecionadas = Array.from(document.querySelectorAll('#containerCategorias input:checked')).map(i => i.value);
      if (categoriasSelecionadas.length === 0) {
        mostrarErro('Selecione pelo menos uma categoria.');
        return;
      }
      const categoria = categoriasSelecionadas[0];
      document.getElementById('categoria').value = categoria;
      const edicao = document.getElementById('edicao').value;

      // Se a edicao for gratuita, todos os artigos ficam gratuitos automaticamente
      let gratuito = edicao ? document.getElementById('gratuito').checked : true;
      if (edicao) {
        try {
          const snapEdicoes = await getDocs(query(collection(db, 'edicoes'), where('nome', '==', edicao)));
          snapEdicoes.forEach(d => { if (d.data().edicaoGratuita) gratuito = true; });
        } catch (e) {}

        // Calcula a proxima ordem disponivel na edicao
        try {
          const snapArtigos = await getDocs(query(collection(db, 'noticias'), where('edicao', '==', edicao)));
          const ordens = [];
          snapArtigos.forEach(d => { if (d.data().ordemEdicao) ordens.push(d.data().ordemEdicao); });
          let ordemCalculada = ordens.length > 0 ? Math.max(...ordens) + 1 : 1;
          const inputOrdem = document.getElementById('ordemEdicao');
          if (inputOrdem) inputOrdem.value = ordemCalculada;
        } catch (e) {}
      }
      let ordemEdicao = parseInt(document.getElementById('ordemEdicao')?.value) || 1;
      const arquivoImagem = document.getElementById('imagem').files[0];

      if (!titulo || !categoria || !conteudo) {
        mostrarErro('Preencha ao menos título, categoria e conteúdo.');
        return;
      }

      let status = STATUS.RASCUNHO;
      if (acao === 'enviar_revisao') status = STATUS.EM_REVISAO;
      if (acao === 'publicar') status = STATUS.PUBLICADO;
      if (acao === 'indexar') status = 'indexado'; // aparece na edicao mas nao no feed avulso

      try {
        let idNoticia = noticiaIdEdicao;

        let cargoEditorialAutor = '';
        try {
          const snapUsuario = await getDoc(doc(db, 'usuarios', usuarioAtual.uid));
          if (snapUsuario.exists()) {
            cargoEditorialAutor = snapUsuario.data().cargoEditorial || '';
          }
        } catch (e) {
          console.error('Não foi possível obter o cargo editorial do autor:', e);
        }

        if (!idNoticia) {
          idNoticia = await criarNoticia(
            { titulo, categoria, categorias: categoriasSelecionadas, resumo, conteudo, status, imagemUrl: imagemAtualUrl, edicao, gratuito, ordemEdicao, cargoEditorialAutor },
            usuarioAtual.uid,
            usuarioAtual.displayName || usuarioAtual.email
          );
        }

        let imagemUrl = imagemAtualUrl;
        if (arquivoImagem) {
          imagemUrl = await enviarImagem(arquivoImagem, idNoticia);
        }

        await atualizarNoticia(idNoticia, { titulo, categoria, categorias: categoriasSelecionadas, resumo, conteudo, status, imagemUrl, edicao, gratuito, cargoEditorialAutor });

        if (status === STATUS.PUBLICADO) {
          fetch('/api/notificar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ noticiaId: idNoticia })
          }).catch(e => console.error('Não foi possível enviar a notificação push:', e));
        }

        noticiaIdEdicao = idNoticia;
        mostrarSucesso('Notícia salva com sucesso!');
        setTimeout(() => window.location.href = 'gerenciar-noticias.html', 1500);
      } catch (err) {
        mostrarErro('Erro ao salvar a notícia. Verifique sua permissão e tente novamente.');
        console.error(err);
      }
    }

    // Inicializa editor Quill — permite negrito, itálico, listas, link, citação,
    // subtítulos (H2/H3) e imagens inseridas no meio do texto (separado da imagem de capa).
    const quillEditor = new Quill('#editorQuill', {
      theme: 'snow',
      placeholder: 'Escreva o texto completo da notícia...',
      modules: {
        toolbar: {
          container: [
            [{ 'header': [2, 3, false] }],
            ['bold', 'italic', 'underline'],
            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
            ['link', 'blockquote', 'image'],
            ['clean']
          ],
          handlers: {
            image: function() {
              const input = document.createElement('input');
              input.setAttribute('type', 'file');
              input.setAttribute('accept', 'image/*');
              input.click();
              input.onchange = async () => {
                const arquivo = input.files[0];
                if (!arquivo) return;
                const range = quillEditor.getSelection(true) || { index: quillEditor.getLength() };
                quillEditor.insertText(range.index, 'Enviando imagem...', { italic: true });
                try {
                  const url = await enviarImagemCloudinary(arquivo);
                  quillEditor.deleteText(range.index, 'Enviando imagem...'.length);
                  quillEditor.insertEmbed(range.index, 'image', url);
                  quillEditor.setSelection(range.index + 1);
                } catch (e) {
                  quillEditor.deleteText(range.index, 'Enviando imagem...'.length);
                  alert('Erro ao enviar imagem: ' + e.message);
                }
              };
            }
          }
        }
      }
    });

    document.getElementById('btnSair').addEventListener('click', async () => {
      await sair();
      window.location.href = '../login.html';
    });
  </script>
</body>
</html>
