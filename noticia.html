<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notícia</title>
</head>
<body>

<div id="conteudo">Carregando notícia...</div>

<script type="module">
import { obterNoticia } from "./js/noticias.js";

const container = document.getElementById("conteudo");

async function carregar() {
  try {
    const id = new URLSearchParams(window.location.search).get("id");

    if (!id) {
      container.innerHTML = "Erro: ID não informado";
      return;
    }

    const timeout = new Promise((_, reject) =>
      setTimeout(() => reject("timeout"), 8000)
    );

    const noticia = await Promise.race([
      obterNoticia(id),
      timeout
    ]);

    if (!noticia) {
      container.innerHTML = "Notícia não encontrada";
      return;
    }

    container.innerHTML = `
      <h1>${noticia.titulo || ""}</h1>
      <div>${(noticia.conteudo || "").split("\n").map(p => `<p>${p}</p>`).join("")}</div>
    `;

  } catch (e) {
    console.error(e);
    container.innerHTML = "Erro ao carregar notícia";
  }
}

carregar();
</script>

</body>
</html>
