<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notícia</title>

  <style>
    .noticia-corpo p {
      font-size: 18px;
      line-height: 1.8;
      margin-bottom: 16px;
      color: #222;
    }

    /* 🔥 estilo jornal (primeira letra grande) */
    .noticia-corpo .dropcap::first-letter {
      float: left;
      font-size: 70px;
      font-weight: 900;
      line-height: 0.8;
      padding-right: 10px;
      font-family: serif;
      color: #111;
    }
  </style>
</head>

<body>

  <div id="conteudoNoticia">Carregando...</div>

  <script type="module">
    import { obterNoticia } from "./js/noticias.js";
    import { registrarVisualizacao, listarComentarios } from "./js/interacoes.js";
    import { montarBannerDeNoticia } from "./js/publicidade.js";

    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { auth } from "./js/firebase-config.js";

    import {
      collection,
      getDocs,
      orderBy,
      query
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const id = new URLSearchParams(window.location.search).get("id");
    const container = document.getElementById("conteudoNoticia");

    let usuarioAtual = null;

    onAuthStateChanged(auth, u => usuarioAtual = u);

    function montarCorpo(texto) {
      const paragrafos = (texto || "").split("\n").filter(Boolean);

      return paragrafos.map((p, i) => {
        if (i === 0) {
          return `<p class="dropcap">${p}</p>`;
        }
        return `<p>${p}</p>`;
      }).join("");
    }

    async function carregar() {
      const noticia = await obterNoticia(id);

      const paragrafos = (noticia.conteudo || "").split("\n");
      const ponto = Math.max(2, Math.floor(paragrafos.length / 3));

      const banner = await montarBannerDeNoticia(id);

      const corpo = paragrafos.map((p, i) => {
        let bloco = i === 0
          ? `<p class="dropcap">${p}</p>`
          : `<p>${p}</p>`;

        if (i === ponto && paragrafos.length > 3) {
          bloco = banner + bloco;
        }

        return bloco;
      }).join("");

      container.innerHTML = `
        <h1>${noticia.titulo}</h1>

        <div id="corpoNoticia" class="noticia-corpo">
          ${corpo}
        </div>

        <button onclick="alert('Curtir ok')">Curtir</button>

        <h3>Comentários</h3>
        <div id="listaComentariosNova"></div>
      `;

      registrarVisualizacao(id);

      carregarComentarios();
    }

    async function carregarComentarios() {
      const el = document.getElementById("listaComentariosNova");
      if (!el) return;

      const lista = await listarComentarios(id);

      if (!lista.length) {
        el.innerHTML = "<p>Nenhum comentário ainda.</p>";
        return;
      }

      el.innerHTML = lista.map(c => `
        <div style="padding:10px 0;border-bottom:1px solid #eee;">
          <strong>${c.autorNome}</strong>
          <p>${c.texto}</p>
        </div>
      `).join("");
    }

    carregar();
  </script>

</body>
</html>
