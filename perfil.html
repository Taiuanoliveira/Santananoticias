<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(function(OneSignal) {
      OneSignal.init({ appId: "d391c7f0-84aa-434a-b6bd-efc73611e68c" });
    });
  </script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Conta – Veritas Notícias</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ===== LAYOUT (mantido, só organizado) ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f4f4f4;color:#0a0a0a}

header{background:#0a0a0a;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
header a.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:#fff;text-decoration:none}
header a.voltar{color:#ccc;text-decoration:none;font-size:13px}

.wrap{max-width:900px;margin:0 auto;padding:32px 20px 80px}

/* tabs */
.tabs{display:flex;gap:4px;border-bottom:2px solid #ddd;margin-bottom:28px;flex-wrap:wrap}
.tab{padding:12px 18px;font-size:13px;font-weight:600;text-transform:uppercase;cursor:pointer;color:#666;border-bottom:3px solid transparent}
.tab.ativa{color:#0a0a0a;border-color:#00cc66}

/* painéis */
.painel{display:none;background:#fff;padding:28px;border-top:4px solid #00cc66;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.painel.ativo{display:block}

/* resto mantido igual */
label{font-size:11px;font-weight:600;text-transform:uppercase;color:#1a1a1a}
input{border:1px solid #ddd;padding:11px 14px;width:100%;margin-top:6px}
.btn-salvar{margin-top:20px;background:#0a0a0a;color:#fff;border:none;padding:12px 24px;cursor:pointer}

.lista-fav li{display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #eee}
.lista-fav li a{text-decoration:none;color:#0a0a0a;font-weight:600}
.lista-fav .rm{background:none;border:none;color:#b3261e;cursor:pointer;font-weight:600}

.msg{display:none;padding:10px 14px;font-size:13px;margin-top:14px;border-left:3px solid}
.msg.sucesso{display:block;background:#e8f5e9;border-left-color:#00cc66}
.msg.erro{display:block;background:#fdecea;border-left-color:#b3261e}

.switch{position:relative;width:44px;height:24px}
.switch input{opacity:0}
.slider{position:absolute;inset:0;background:#ccc;border-radius:24px}
input:checked + .slider{background:#00cc66}
</style>
</head>

<body>

<header>
  <a href="index.html" class="logo">Veritas Notícias</a>
  <a href="index.html" class="voltar">← Voltar</a>
</header>

<div class="wrap">

  <div class="tabs">
    <div class="tab ativa" data-painel="dados">Meus Dados</div>
    <div class="tab" data-painel="favoritos">Favoritos</div>
    <div class="tab" data-painel="lerDepois">Ler depois</div>
    <div class="tab" data-painel="notif">Notificações</div>
    <div class="tab" data-painel="plano">Plano</div>
  </div>

  <!-- DADOS -->
  <div class="painel ativo" id="painel-dados">
    <h2>Meus Dados</h2>

    <input type="file" id="inputFoto" style="display:none">
    <button class="btn-salvar" onclick="document.getElementById('inputFoto').click()">Alterar foto</button>

    <label>Nome</label>
    <input id="nomeInput">

    <label>Email</label>
    <input id="emailInput" disabled>

    <button class="btn-salvar" onclick="salvarDados()">Salvar</button>
    <div id="msgDados" class="msg"></div>
  </div>

  <!-- FAVORITOS -->
  <div class="painel" id="painel-favoritos">
    <h2>Favoritos</h2>
    <ul class="lista-fav" id="listaFavoritos"></ul>
    <div id="favVazio" style="display:none;color:#777;">Nenhum favorito</div>
  </div>

  <!-- NOTIFICAÇÕES -->
  <div class="painel" id="painel-notif">
    <h2>Notificações</h2>

    <label><input type="checkbox" id="notifSite"> Site</label>
    <label><input type="checkbox" id="notifEmail"> Email</label>
    <label><input type="checkbox" id="notifNewsletter"> Newsletter</label>

    <button class="btn-salvar" onclick="salvarNotificacoes()">Salvar</button>
    <div id="msgNotif" class="msg"></div>
  </div>

</div>

<script type="module">
import { auth, db } from './js/firebase-config.js';
import { onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { doc, getDoc, setDoc, updateDoc, arrayRemove } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { enviarImagemCloudinary } from './js/cloudinary.js';

/* ===== TABS ===== */
document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('ativa'));
    document.querySelectorAll('.painel').forEach(p=>p.classList.remove('ativo'));
    tab.classList.add('ativa');
    document.getElementById('painel-'+tab.dataset.painel).classList.add('ativo');
  };
});

let usuarioAtual = null;

/* ===== AUTH (corrigido sem duplicar listener) ===== */
onAuthStateChanged(auth, async (user)=>{
  if(!user) return (window.location.href='login.html');

  usuarioAtual = user;

  document.getElementById('nomeInput').value = user.displayName || '';
  document.getElementById('emailInput').value = user.email || '';

  const ref = doc(db,'usuarios',user.uid);
  const snap = await getDoc(ref);
  const data = snap.exists() ? snap.data() : {};

  document.getElementById('notifSite').checked = !!data.notifSite;
  document.getElementById('notifEmail').checked = !!data.notifEmail;
  document.getElementById('notifNewsletter').checked = !!data.notifNewsletter;

  const lista = document.getElementById('listaFavoritos');
  const vazio = document.getElementById('favVazio');

  const favs = data.favoritos || [];

  if(!favs.length) vazio.style.display='block';

  favs.forEach(f=>{
    const li=document.createElement('li');
    li.innerHTML = `<a href="${f.url||'#'}">${f.titulo||'Notícia'}</a>
    <button class="rm">Remover</button>`;

    li.querySelector('.rm').onclick = async ()=>{
      await updateDoc(ref,{favoritos:arrayRemove(f)});
      li.remove();
    };

    lista.appendChild(li);
  });
});

/* ===== SALVAR DADOS ===== */
window.salvarDados = async ()=>{
  const nome = document.getElementById('nomeInput').value.trim();
  const msg = document.getElementById('msgDados');

  try{
    await updateProfile(usuarioAtual,{displayName:nome});
    await setDoc(doc(db,'usuarios',usuarioAtual.uid),{nome},{merge:true});
    msg.className='msg sucesso';
    msg.textContent='Salvo!';
  }catch(e){
    msg.className='msg erro';
    msg.textContent=e.message;
  }
};

/* ===== NOTIFICAÇÕES ===== */
window.salvarNotificacoes = async ()=>{
  const msg=document.getElementById('msgNotif');

  try{
    await setDoc(doc(db,'usuarios',usuarioAtual.uid),{
      notifSite:document.getElementById('notifSite').checked,
      notifEmail:document.getElementById('notifEmail').checked,
      notifNewsletter:document.getElementById('notifNewsletter').checked
    },{merge:true});

    msg.className='msg sucesso';
    msg.textContent='Salvo!';
  }catch(e){
    msg.className='msg erro';
    msg.textContent=e.message;
  }
};
</script>

</body>
</html>
