<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar – Santana.com</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-card { background: #fff; width: 100%; max-width: 420px; padding: 40px 36px; border-top: 4px solid #00cc66; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .auth-logo { display: block; text-align: center; font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; color: #0a0a0a; margin-bottom: 24px; text-decoration: none; }
    .auth-logo span { color: #00cc66; }
    h1 { font-family: 'Playfair Display', serif; font-size: 24px; text-align: center; margin-bottom: 8px; color: #0a0a0a; }
    .auth-sub { text-align: center; font-size: 13px; color: #555; margin-bottom: 24px; }
    .auth-form { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 12px; font-weight: 600; color: #1a1a1a; margin-top: 12px; text-transform: uppercase; letter-spacing: 0.5px; display: block; }
    input { border: 1px solid #ddd; padding: 11px 14px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; width: 100%; }
    input:focus { border-color: #00cc66; }
    .btn-auth { margin-top: 20px; background: #0a0a0a; color: #fff; border: none; padding: 13px; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; transition: background 0.2s; width: 100%; }
    .btn-auth:hover { background: #00cc66; }
    .btn-google { background: #fff; color: #0a0a0a; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; width: 100%; padding: 12px; font-size: 14px; font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.2s; }
    .btn-google:hover { background: #f5f5f5; }
    .auth-divisor { display: flex; align-items: center; margin: 20px 0; color: #888; font-size: 12px; }
    .auth-divisor::before, .auth-divisor::after { content: ''; flex: 1; height: 1px; background: #ddd; }
    .auth-divisor span { padding: 0 12px; }
    .auth-rodape { text-align: center; font-size: 13px; color: #555; margin-top: 20px; }
    .auth-rodape a { color: #00cc66; font-weight: 600; text-decoration: none; }
    .link-esqueci { display: block; text-align: right; font-size: 12px; color: #00cc66; margin-top: 6px; text-decoration: none; }
    .auth-msg { padding: 10px 14px; font-size: 13px; margin-bottom: 16px; border-left: 3px solid; display: none; }
    .auth-msg.erro { background: #fdecea; color: #b3261e; border-left-color: #b3261e; display: block; }
    .auth-msg.sucesso { background: #e8f5e9; color: #1a5c2a; border-left-color: #00cc66; display: block; }
    .campo-senha { position: relative; }
    .campo-senha input { padding-right: 42px; }
    .toggle-senha { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 6px; color: #888; display: flex; line-height: 0; }
    .toggle-senha:hover { color: #0a0a0a; }
    .toggle-senha svg { width: 19px; height: 19px; }
    .toggle-senha .olho-fechado { display: none; }
    .toggle-senha.mostrando .olho-aberto { display: none; }
    .toggle-senha.mostrando .olho-fechado { display: block; }
  </style>
</head>
<body>
  <div class="auth-card">
    <a href="index.html" class="auth-logo">Santana<span>.com</span></a>
    <h1>Entrar</h1>
    <p class="auth-sub">Acesse o painel administrativo.</p>
    <div id="msgErro" class="auth-msg"></div>
    <div class="auth-form">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com">
      <label>Senha</label>
      <div class="campo-senha">
        <input type="password" id="senha" placeholder="••••••••">
        <button type="button" class="toggle-senha" onclick="toggleSenha('senha', this)" aria-label="Mostrar senha" tabindex="-1">
          <svg class="olho-aberto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="olho-fechado" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 19c-7 0-11-7-11-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A10.07 10.07 0 0 1 12 5c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
      <a href="recuperar-senha.html" class="link-esqueci">Esqueci minha senha</a>
      <button class="btn-auth" onclick="fazerLogin()">Entrar</button>
    </div>
    <div class="auth-divisor"><span>ou</span></div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Entrar com Google
    </button>
    <div class="auth-rodape">Não tem conta? <a href="cadastro.html">Criar conta</a></div>
  </div>

  <script>
    function toggleSenha(id, btn) {
      const input = document.getElementById(id);
      const mostrar = input.type === 'password';
      input.type = mostrar ? 'text' : 'password';
      btn.classList.toggle('mostrando', mostrar);
    }
  </script>

  <script type="module">
    import { auth, db } from './js/firebase-config.js';
    import { signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    function erro(msg) {
      const el = document.getElementById('msgErro');
      el.textContent = msg;
      el.className = 'auth-msg erro';
    }

    async function redirecionar(uid) {
      const snap = await getDoc(doc(db, 'usuarios', uid));
      if (snap.exists()) {
        window.location.href = 'admin/dashboard.html';
      } else {
        erro('Usuário sem acesso ao painel.');
        await auth.signOut();
      }
    }

    window.fazerLogin = async function() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      if (!email || !senha) return erro('Preencha e-mail e senha.');
      try {
        const cred = await signInWithEmailAndPassword(auth, email, senha);
        await redirecionar(cred.user.uid);
      } catch(e) {
        erro('E-mail ou senha incorretos.');
      }
    };

    window.loginGoogle = async function() {
      try {
        const cred = await signInWithPopup(auth, new GoogleAuthProvider());
        await redirecionar(cred.user.uid);
      } catch(e) {
        erro('Erro ao entrar com Google: ' + e.message);
      }
    };

    document.getElementById('senha').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.fazerLogin();
    });
  </script>
</body>
</html>
